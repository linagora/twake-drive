<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scribe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      min-height: 60px;
    }
    #scribe-trigger {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      padding: 0;
    }
    #scribe-trigger:hover:not(:disabled) {
      background: rgba(99, 102, 241, 0.08);
      box-shadow: 0 1px 4px rgba(99, 102, 241, 0.2);
    }
    #scribe-trigger:active:not(:disabled) {
      background: rgba(99, 102, 241, 0.15);
    }
    #scribe-trigger:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    #scribe-trigger svg {
      width: 20px;
      height: 20px;
    }
    #scribe-hint {
      margin-top: 6px;
      font-size: 10px;
      color: rgba(0, 0, 0, 0.45);
      text-align: center;
      transition: opacity 0.15s;
    }
    #scribe-hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <button id="scribe-trigger" disabled title="Scribe">
    <!-- Sparkle / wand icon (inline SVG) -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .963L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      <path d="M20 3v4"/>
      <path d="M22 5h-4"/>
    </svg>
  </button>
  <div id="scribe-hint">Select text to activate</div>

  <script type="text/javascript"
    src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js">
  </script>
  <script type="text/javascript" src="scripts/code.js"></script>
</body>
</html>
